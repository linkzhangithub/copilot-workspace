<!DOCTYPE html>
<html>
<head>
  <title>清除 localStorage</title>
</head>
<body>
  <h2>LocalStorage 清理工具</h2>
  <button onclick="clearAll()">清除所有 localStorage 数据</button>
  <button onclick="clearProjects()">仅清除项目数据</button>
  <button onclick="clearQualityCheck()">清除质检记录</button>
  <p id="status"></p>
  
  <script>
    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    
    function clearProjects() {
      localStorage.removeItem('vue-projects');
      updateStatus('项目数据已清除！');
    }
    
    function clearQualityCheck() {
      // 清除所有质检相关数据
      const keys = Object.keys(localStorage);
      keys.forEach(key => {
        if (key.startsWith('quality-check-')) {
          localStorage.removeItem(key);
        }
      });
      updateStatus('质检记录已清除！');
    }
    
    function clearAll() {
      localStorage.clear();
      updateStatus('所有 localStorage 数据已清除！');
    }
  </script>
</body>
</html>
